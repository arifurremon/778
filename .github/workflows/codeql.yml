# CodeQL static analysis for JavaScript/TypeScript.
# Upload to GitHub Code Scanning only when enabled for the repository.
# Set repository variable CODEQL_UPLOAD_SARIF=true after enabling
# Settings → Code security and analysis → Code scanning.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "32 21 * * 3"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
          # Avoid failing PRs when Code Scanning is not enabled on the repo.
          # Set repo variable CODEQL_UPLOAD_SARIF=true once scanning is enabled.
          upload: ${{ vars.CODEQL_UPLOAD_SARIF == 'true' }}
