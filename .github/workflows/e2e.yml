name: E2E (Playwright)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: thechattala_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d thechattala_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      AUTH_SECRET: ci-auth-secret-must-be-at-least-32-chars-long
      NEXTAUTH_URL: http://localhost:9002
      NEXT_PUBLIC_APP_URL: http://localhost:9002
      E2E_USER_EMAIL: e2e@chattala.test
      E2E_USER_PASSWORD: E2eSecure123!
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
