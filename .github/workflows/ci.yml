name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Lint, typecheck, tests & coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: thechattala_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d thechattala_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      AUTH_SECRET: ci-auth-secret-must-be-at-least-32-chars-long
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit & integration tests with coverage
        run: npm run test:coverage

      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: validate

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: thechattala_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d thechattala_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      AUTH_SECRET: ci-auth-secret-must-be-at-least-32-chars-long
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXTAUTH_URL: http://localhost:3000
      SENTRY_AUTH_TOKEN: ""
      SENTRY_ORG: ""
      SENTRY_PROJECT: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build
