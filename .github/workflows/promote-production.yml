name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      staging_url:
        description: Staging base URL for smoke tests
        required: true
        type: string
      release_tag:
        description: Optional git tag to deploy (e.g. v1.2.0). Leave empty for latest staging HEAD.
        required: false
        type: string

concurrency:
  group: promote-production
  cancel-in-progress: false

jobs:
  staging-smoke:
    name: Staging smoke tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke against staging
        env:
          STAGING_URL: ${{ inputs.staging_url }}
        run: bash scripts/staging-smoke.sh

      - name: Validate branch alignment
        run: |
          git fetch origin staging main
          BEHIND=$(git rev-list --count origin/staging..origin/main)
          AHEAD=$(git rev-list --count origin/main..origin/staging)
          echo "staging behind main: ${BEHIND} commits"
          echo "staging ahead of main: ${AHEAD} commits"
          if [[ "$AHEAD" -eq 0 && "$BEHIND" -gt 0 ]]; then
            echo "⚠️  staging has no commits ahead of main — merge release to staging first."
          fi

  production-approval:
    name: Manual production approval
    runs-on: ubuntu-latest
    needs: staging-smoke
    environment: production

    steps:
      - name: Record approval
        run: |
          echo "Production promotion approved for staging URL: ${{ inputs.staging_url }}"
          echo "Requested by: ${{ github.actor }}"
          echo "Release tag: ${{ inputs.release_tag || 'staging HEAD' }}"

  deploy-production:
    name: Deploy production (Vercel)
    runs-on: ubuntu-latest
    needs: production-approval
    if: ${{ secrets.VERCEL_TOKEN != '' && secrets.VERCEL_ORG_ID != '' && secrets.VERCEL_PROJECT_ID != '' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag != '' && format('refs/tags/{0}', inputs.release_tag) || 'staging' }}

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to production Vercel project
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN"

  merge-to-main:
    name: Merge staging → main (optional tag)
    runs-on: ubuntu-latest
    needs: production-approval
    if: ${{ github.ref == 'refs/heads/staging' || github.event_name == 'workflow_dispatch' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Document promotion
        run: |
          echo "## Production Promotion" >> "$GITHUB_STEP_SUMMARY"
          echo "- Staging URL: ${{ inputs.staging_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Approved by: ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag: ${{ inputs.release_tag || 'none' }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "After deploy, run post-deploy smoke on production per docs/PROMOTION_WORKFLOW.md" >> "$GITHUB_STEP_SUMMARY"
