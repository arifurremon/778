name: Weekly Backup Verification

on:
  schedule:
    # Mondays 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  backup-smoke:
    name: Staging DB smoke + migrate
    runs-on: ubuntu-latest
    if: ${{ secrets.STAGING_DATABASE_URL != '' }}

    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.STAGING_DATABASE_URL }}
      AUTH_SECRET: ci-auth-secret-must-be-at-least-32-chars-long
      NEXT_PUBLIC_APP_URL: https://staging.thechattala.com
      ADMIN_MFA_REQUIRED: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Verify migrations and run smoke query
        run: npm run migrate:verify-fresh

      - name: Summary
        run: |
          echo "Backup verification passed against STAGING_DATABASE_URL"
          echo "Configure GitHub secret STAGING_DATABASE_URL to enable this job."

  backup-smoke-skipped:
    name: Skipped (no STAGING_DATABASE_URL)
    runs-on: ubuntu-latest
    if: ${{ secrets.STAGING_DATABASE_URL == '' }}
    steps:
      - name: Notice
        run: |
          echo "Set repository secret STAGING_DATABASE_URL to enable weekly backup verification."
          echo "Optional: point at a Neon read replica or restored PITR branch for DR validation."
