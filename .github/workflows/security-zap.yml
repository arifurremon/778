name: Security — OWASP ZAP Baseline

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      target_url:
        description: Target URL for ZAP scan
        required: false
        default: "https://www.thechattala.com"

jobs:
  zap-baseline:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: ${{ inputs.target_url || secrets.STAGING_URL || 'https://www.thechattala.com' }}
          cmd_options: "-a -j"
          allow_issue_writing: false

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
          retention-days: 30
