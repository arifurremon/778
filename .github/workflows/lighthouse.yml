name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse performance budget
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: thechattala_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d thechattala_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/thechattala_ci
      AUTH_SECRET: ci-auth-secret-must-be-at-least-32-chars-long
      NEXTAUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      ADMIN_MFA_REQUIRED: "false"
      PORT: "3000"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run build

      - name: Run Lighthouse CI
        run: |
          npm run start &
          npx wait-on http://localhost:3000 --timeout 120000
          npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
